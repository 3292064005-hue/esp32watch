name: platformio-build

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_validation:
        description: Run release/device validation jobs
        required: false
        default: false
        type: boolean

jobs:
  host-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install host Python test dependencies
        run: python3 -m pip install -r tools/requirements-host.txt
      - name: Generate asset contract + bootstrap contract
        run: python3 tools/generate_asset_contract.py
      - name: Verify partition contract
        run: python3 tools/verify_partition_contract.py
      - name: Web runtime smoke
        run: node ./tools/web_runtime_smoke.js
      - name: Host sanity
        env:
          SKIP_PIO: "1"
          PIO_TIMEOUT_SEC: 1200
        run: bash ./tools/host_sanity_check.sh

  build-firmware:
    runs-on: ubuntu-latest
    needs: host-sanity
    strategy:
      fail-fast: false
      matrix:
        env: [esp32s3_n16r8_dev, esp32s3_n16r8_release]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Generate asset contract + bootstrap contract
        run: python3 tools/generate_asset_contract.py
      - name: Verify partition contract
        run: python3 tools/verify_partition_contract.py
      - name: Build firmware + LittleFS + candidate bundle
        run: bash ./tools/verify_platformio_build.sh ${{ matrix.env }}
      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32watch-${{ matrix.env }}-candidate
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/littlefs.bin
            dist/esp32watch-${{ matrix.env }}-candidate.zip
            dist/host-validation/${{ matrix.env }}-host-validation.json
            data/asset-contract.json
            data/contract-bootstrap.json
            partitions/esp32s3_n16r8_littlefs.csv

  capture-device-smoke:
    if: "github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_validation == 'true')"
    runs-on: [self-hosted, esp32watch-device]
    needs: build-firmware
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flashing dependencies
        run: pip install esptool
      - name: Download release candidate bundle
        uses: actions/download-artifact@v4
        with:
          name: esp32watch-esp32s3_n16r8_release-candidate
          path: dist/device-capture-input
      - name: Materialize runner capability manifest
        env:
          DEVICE_RUNNER_CAPABILITIES_JSON: ${{ vars.ESP32WATCH_DEVICE_RUNNER_CAPABILITIES_JSON }}
        run: |
          if [ -z "${DEVICE_RUNNER_CAPABILITIES_JSON:-}" ]; then
            echo "missing runner capability manifest JSON" >&2
            exit 1
          fi
          printf '%s\n' "$DEVICE_RUNNER_CAPABILITIES_JSON" > dist/device-capture-input/runner-capabilities.json
      - name: Flash release candidate onto attached device
        env:
          DEVICE_SERIAL_PORT: ${{ secrets.ESP32WATCH_DEVICE_SERIAL_PORT }}
          DEVICE_FLASH_BAUD: ${{ vars.ESP32WATCH_DEVICE_FLASH_BAUD }}
        run: |
          python3 tools/flash_candidate_bundle.py \
            --bundle dist/device-capture-input/esp32watch-esp32s3_n16r8_release-candidate.zip \
            --port "$DEVICE_SERIAL_PORT" \
            --baud "${DEVICE_FLASH_BAUD:-921600}" \
            --output dist/device-capture-input/flash-evidence.json
      - name: Capture live scenario evidence
        env:
          DEVICE_BASE_URL: ${{ secrets.ESP32WATCH_DEVICE_BASE_URL }}
          DEVICE_AUTH_TOKEN: ${{ secrets.ESP32WATCH_DEVICE_AUTH_TOKEN }}
          DEVICE_ID: ${{ vars.ESP32WATCH_DEVICE_ID }}
          DEVICE_WIFI_PASSWORD: ${{ secrets.ESP32WATCH_DEVICE_WIFI_PASSWORD }}
          DEVICE_LAB_ID: ${{ vars.ESP32WATCH_DEVICE_LAB_ID }}
        run: |
          if [ -z "${DEVICE_BASE_URL:-}" ] || [ -z "${DEVICE_WIFI_PASSWORD:-}" ]; then
            echo "missing scenario runner inputs" >&2
            exit 1
          fi
          python3 tools/run_device_scenarios.py \
            --base-url "$DEVICE_BASE_URL" \
            --auth-token "$DEVICE_AUTH_TOKEN" \
            --device-id "$DEVICE_ID" \
            --wifi-password "$DEVICE_WIFI_PASSWORD" \
            --runner-capabilities dist/device-capture-input/runner-capabilities.json \
            --candidate-bundle dist/device-capture-input/esp32watch-esp32s3_n16r8_release-candidate.zip \
            --runner-identity "${RUNNER_NAME:-CI_DEVICE_RUNNER}" \
            --lab-identity "${DEVICE_LAB_ID:-CI_DEVICE_LAB}" \
            --attest-physical-actions \
            --output dist/device-capture-input/device-scenario-evidence.json
      - name: Capture live device smoke report
        env:
          DEVICE_BASE_URL: ${{ secrets.ESP32WATCH_DEVICE_BASE_URL }}
          DEVICE_AUTH_TOKEN: ${{ secrets.ESP32WATCH_DEVICE_AUTH_TOKEN }}
          DEVICE_ID: ${{ vars.ESP32WATCH_DEVICE_ID }}
          DEVICE_BOARD: ${{ vars.ESP32WATCH_DEVICE_BOARD }}
          DEVICE_LAB_ID: ${{ vars.ESP32WATCH_DEVICE_LAB_ID }}
        run: |
          python3 tools/capture_device_smoke_report.py \
            --base-url "$DEVICE_BASE_URL" \
            --auth-token "$DEVICE_AUTH_TOKEN" \
            --device-id "$DEVICE_ID" \
            --board "${DEVICE_BOARD:-esp32watch}" \
            --env esp32s3_n16r8_release \
            --candidate-bundle dist/device-capture-input/esp32watch-esp32s3_n16r8_release-candidate.zip \
            --flash-evidence dist/device-capture-input/flash-evidence.json \
            --scenario-evidence dist/device-capture-input/device-scenario-evidence.json \
            --capture-runner CI_DEVICE_RUNNER \
            --runner-identity "${RUNNER_NAME:-CI_DEVICE_RUNNER}" \
            --lab-identity "${DEVICE_LAB_ID:-CI_DEVICE_LAB}" \
            --attest-physical-actions \
            --output dist/device-capture-input/device-smoke-report.json
      - name: Promote verified release bundle
        run: |
          python3 tools/promote_release_bundle.py \
            --env esp32s3_n16r8_release \
            --bundle dist/device-capture-input/esp32watch-esp32s3_n16r8_release-candidate.zip \
            --device-smoke-report dist/device-capture-input/device-smoke-report.json \
            --output dist/device-capture-input/esp32watch-esp32s3_n16r8_release-verified.zip
      - name: Verify promoted release bundle
        run: |
          python3 tools/verify_release_bundle.py \
            --env esp32s3_n16r8_release \
            --bundle dist/device-capture-input/esp32watch-esp32s3_n16r8_release-verified.zip
      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32watch-esp32s3_n16r8_release-verified
          path: |
            dist/device-capture-input/runner-capabilities.json
            dist/device-capture-input/device-scenario-evidence.json
            dist/device-capture-input/device-smoke-report.json
            dist/device-capture-input/esp32watch-esp32s3_n16r8_release-verified.zip

  verify-verified-release:
    if: "github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_validation == 'true')"
    runs-on: ubuntu-latest
    needs: capture-device-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download verified release artifact
        uses: actions/download-artifact@v4
        with:
          name: esp32watch-esp32s3_n16r8_release-verified
          path: dist/verified-check
      - name: Verify verified release bundle
        run: |
          python3 tools/verify_release_bundle.py \
            --env esp32s3_n16r8_release \
            --bundle dist/verified-check/esp32watch-esp32s3_n16r8_release-verified.zip
