; PlatformIO Project Configuration File

[env:esp32s3_n16r8]
platform = espressif32
board = esp32s3_n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_upload.flash_size = 16MB
board_build.partitions = partitions/esp32s3_n16r8_littlefs.csv
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000L
board_build.filesystem = littlefs
board_littlefs.size = 0x360000
build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DAPP_BOARD_PROFILE_ESP32S3_WATCH
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DAPP_DISABLE_SLEEP=1
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DESP32_I2C_SDA_GPIO=8
    -DESP32_I2C_SCL_GPIO=9
    -DESP32_MPU_I2C_SDA_GPIO=4
    -DESP32_MPU_I2C_SCL_GPIO=5
lib_deps =
    adafruit/Adafruit NeoPixel@^1.11.0
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit SSD1306@^2.5.7
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer
build_src_filter =
    +<*>
    -<main.c>
    -<system_init.c>
    -<services/time_service.c>
    -<reset_reason.c>
    -<stm32f1xx_it.c>
    -<stm32f1xx_hal_msp.c>
    -<system_stm32f1xx.c>
    -<syscalls.c>
    -<sysmem.c>
    -<bsp_adc.c>
    -<bsp_i2c.c>
    -<drv_ssd1306.c>
    -<esp32_hal_compat.cpp>
