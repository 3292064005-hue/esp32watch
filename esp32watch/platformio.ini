; PlatformIO Project Configuration File

[platformio]
default_envs = esp32s3_n16r8_dev, esp32s3_n16r8_release

[env:esp32s3_n16r8_base]
platform = espressif32 @ 6.10.0
board = esp32s3_n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_upload.flash_size = 16MB
board_build.partitions = partitions/esp32s3_n16r8_littlefs.csv
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000L
board_build.filesystem = littlefs
board_littlefs.size = 0x360000
board_build.embed_txtfiles =
    data/certs/weather_ca_bundle.pem
build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DAPP_BOARD_PROFILE_ESP32S3_WATCH
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DESP32_I2C_SDA_GPIO=8
    -DESP32_I2C_SCL_GPIO=9
    -DESP32_MPU_I2C_SDA_GPIO=4
    -DESP32_MPU_I2C_SCL_GPIO=5
    -DESP32_KEY_UP_GPIO=11
    -DESP32_KEY_DOWN_GPIO=1
    -DESP32_KEY_OK_GPIO=6
    -DESP32_KEY_BACK_GPIO=3
    -DESP32_IDLE_LIGHT_SLEEP_ENABLED=1
    -DESP32_IDLE_LIGHT_SLEEP_MIN_MS=2
    -DESP32_IDLE_LIGHT_SLEEP_ACTIVE_MS=6
    -DESP32_IDLE_LIGHT_SLEEP_UI_SLEEP_MS=40
    -DESP32_IDLE_LIGHT_SLEEP_MAX_MS=100
    -DWEB_LITTLEFS_AUTO_FORMAT_ON_MOUNT_FAILURE=0
    -DAPP_NETWORK_SYNC_TLS_ALLOW_INSECURE=0
lib_deps =
    adafruit/Adafruit NeoPixel@1.11.0
    adafruit/Adafruit GFX Library@1.11.5
    adafruit/Adafruit SSD1306@2.5.7
    ESP32Async/AsyncTCP@3.4.10
    ESP32Async/ESPAsyncWebServer@3.9.3
    bblanchon/ArduinoJson@6.21.5
build_src_filter =
    +<*>
    -<legacy/>
    -<main.c>
    -<system_init.c>
    -<reset_reason.c>
    -<stm32f1xx_it.c>
    -<stm32f1xx_hal_msp.c>
    -<system_stm32f1xx.c>
    -<syscalls.c>
    -<sysmem.c>
    -<esp32_hal_compat.cpp>

[env:esp32s3_n16r8_dev]
extends = env:esp32s3_n16r8_base
build_flags =
    ${env:esp32s3_n16r8_base.build_flags}
    -DAPP_DISABLE_SLEEP=1
    -DAPP_RUN_PROFILE_DEV=1
    -DMODEL_ENABLE_LEGACY_PROJECTION=0
    -DRUNTIME_EVENT_ENABLE_COMPAT_REGISTRATION=0
    -DWEB_PROVISIONING_SERIAL_PASSWORD_LOG=1

[env:esp32s3_n16r8_release]
extends = env:esp32s3_n16r8_base
build_flags =
    ${env:esp32s3_n16r8_base.build_flags}
    -DAPP_RUN_PROFILE_RELEASE=1
    -DMODEL_ENABLE_LEGACY_PROJECTION=0
    -DRUNTIME_EVENT_ENABLE_COMPAT_REGISTRATION=0
    -DWEB_PROVISIONING_SERIAL_PASSWORD_LOG=0
